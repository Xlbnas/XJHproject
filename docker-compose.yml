services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "964:964"
    environment:
      - NODE_ENV=production
    volumes:
      - ./backend:/app/backend
      - backend_node_modules:/app/backend/node_modules
    command: npm start

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "198:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  backend_node_modules:
  frontend_node_modules:
