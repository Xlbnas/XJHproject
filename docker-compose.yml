services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "964:964"
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - ./backend/.env
    volumes:
      # 挂载数据目录以持久化 SQLite 数据库
      - ./backend/data:/app/backend/data
    command: uvicorn app.main:app --host 0.0.0.0 --port 964 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "198:80"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
